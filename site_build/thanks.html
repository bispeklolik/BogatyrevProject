<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Заявка отправлена — Матвей Богатырёв</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<script src="metrika.js"></script>
<style>
  :root{
    --bg:#EFE6CD; --ink:#2E3828; --text:#3F4A36; --text-2:#525E45; --gold:#A88A4A;
    --gold-2:#8E7236; --pearl:#FAF3DD; --ink-bg:#3F4A36;
    --serif:"Cormorant Garamond","EB Garamond","Playfair Display",Georgia,"Times New Roman",serif;
    --sans:"Inter","Helvetica Neue",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:40px;text-align:center;line-height:1.65}
  .card{max-width:620px}
  .mark{width:52px;height:52px;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-style:italic;color:var(--gold);font-size:28px;margin:0 auto 28px}
  .eyebrow{font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;font-weight:600}
  h1{font-family:var(--serif);font-weight:400;font-size:clamp(38px,6vw,60px);line-height:1.05;color:var(--ink);margin:0 0 24px}
  h1 em{font-style:italic;color:var(--gold)}
  p{font-size:18px;color:var(--text-2);font-family:var(--serif);margin:0 0 16px}
  p a{color:var(--gold-2);text-decoration:underline}
  .btn{display:inline-block;margin-top:24px;background:var(--ink-bg);color:var(--pearl);border:1px solid var(--ink-bg);
    padding:16px 34px;font-family:var(--sans);font-size:12px;letter-spacing:.24em;text-transform:uppercase;
    font-weight:600;text-decoration:none;transition:all .25s}
  .btn:hover{background:var(--gold);border-color:var(--gold);color:var(--ink-bg)}
</style>
</head>
<body>
  <div class="card">
    <div class="mark">М</div>
    <div class="eyebrow">Заявка получена</div>
    <h1>Спасибо.<br/><em>Я прочитаю и отвечу.</em></h1>
    <p>Отвечаю на заявки в течение 1–2 рабочих дней — на тот контакт, который ты оставил. Если ответа долго нет, проверь папку «спам».</p>
    <p>Пока можешь прочитать <a href="manifest.html">манифест</a> — это самый полный рассказ о том, как и для кого я работаю.</p>
    <a href="index.html" class="btn">На главную</a>
  </div>
</body>
</html>
